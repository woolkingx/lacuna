<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="flameGrad32" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#ff6b1a"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
    <filter id="flameGlow32" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" rx="7" ry="7" fill="#1a1a2e"/>

  <!-- Flame (scaled 32/128 = 0.25×)
    Center: (16,16)
    Base: (16,21.25), tip: (16,11)
  -->
  <path
    d="M 16,21.25
       C 11,19.5 10,15.5 12,13
       C 13,11.5 14,10 16,11
       C 18,10 19,11.5 20,13
       C 22,15.5 21,19.5 16,21.25
       Z"
    fill="url(#flameGrad32)"
    filter="url(#flameGlow32)"
    opacity="0.95"
  />

  <!-- Isometric cube wireframe (scaled 0.25×, center at 16,16)
    w=7, h=4
    top(16,8), right(23,12), bottom(16,16), left(9,12)
    bl(9,20), bc(16,24), br(23,20)
  -->
  <g stroke="rgba(255,255,255,0.85)" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Top face -->
    <line x1="16" y1="8" x2="23" y2="12"/>
    <line x1="23" y1="12" x2="16" y2="16"/>
    <line x1="16" y1="16" x2="9" y2="12"/>
    <line x1="9" y1="12" x2="16" y2="8"/>
    <!-- Left face -->
    <line x1="9" y1="12" x2="9" y2="20"/>
    <line x1="16" y1="16" x2="16" y2="24"/>
    <line x1="9" y1="20" x2="16" y2="24"/>
    <!-- Right face -->
    <line x1="23" y1="12" x2="23" y2="20"/>
    <line x1="23" y1="20" x2="16" y2="24"/>
  </g>
</svg>
